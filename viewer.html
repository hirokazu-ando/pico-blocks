<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PycoBlocks ブロックビューアー</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #f8fafc; }

    #title-bar {
      display: none;
      background: #1e293b;
      color: #e2e8f0;
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 13px;
      padding: 0 14px;
      height: 32px;
      line-height: 32px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #blockly-div {
      position: absolute;
      left: 0;
      right: 0;
      overflow: hidden;
    }

    /*
      Blockly のワークスペース縮尺は常に 1 に固定し、見た目のズームのみ
      SVG の CSS transform で行う（内部スケールと CSS が混ざって細くなるのを抑える）。
      minVisual の下限で読みやすさ優先（?readable=0 で強い収め）。
    */
    #blockly-div.viewer-compact .blocklySvg {
      transform-origin: top left;
      transform: scale(var(--viewer-css-scale, 1));
      /* 縮小した分だけSVGのDOM幅高を拡大し、Blocklyのスクロール計算を正常に保つ */
      width:  calc(100% / var(--viewer-css-scale, 1)) !important;
      height: calc(100% / var(--viewer-css-scale, 1)) !important;
    }

    /* ブロック操作を無効化（ズームコントロールは別レイヤーなので影響なし） */
    .blocklyBlockCanvas,
    .blocklyBubbleCanvas {
      pointer-events: none !important;
    }

    #error-msg {
      display: none;
      position: absolute;
      inset: 0;
      align-items: center;
      justify-content: center;
      font-family: sans-serif;
      font-size: 14px;
      color: #94a3b8;
    }

    /* FieldTextInput / FieldNumber：オーバーレイ編集時の読みやすさ（細さ対策で高さ・横幅の下限を持たせる） */
    .blocklyHtmlInput,
    .blocklyHtmlInput input,
    .blocklyHtmlInput textarea {
      min-height: 44px !important;
      min-width: min(420px, 92vw) !important;
      padding: 6px 10px !important;
      line-height: 1.45 !important;
      box-sizing: border-box !important;
      font-size: 15px !important;
    }
  </style>
  <script src="https://unpkg.com/blockly@12.5.1/blockly.min.js"
          integrity="sha384-SxxR8fpocVLJMl6kYyBm33uuy9U1yy0gMrMavfyCd3lQRer3qaBMlcVb0VSAfzop"
          crossorigin="anonymous"></script>
</head>
<body>
  <div id="title-bar"></div>
  <div id="blockly-div"></div>
  <div id="error-msg">ブロックを読み込めませんでした</div>

  <!-- ブロック定義（app.js・game_engine.js・Skulpt は不要） -->
  <script src="js/block_palette.js?v=20260429a"></script>
  <script src="js/blocks/gpio.js"></script>
  <script src="js/blocks/control.js"></script>
  <script src="js/blocks/polyviabot.js?v=20260427c"></script>
  <script src="js/blocks/sensors.js?v=20260427c"></script>
  <script src="js/blocks/values.js?v=20260427b"></script>
  <script src="js/blocks/variables.js"></script>
  <script src="js/blocks/display.js"></script>
  <script src="js/generators/micropython.js"></script>
  <script src="js/blocks/python_intro.js"></script>
  <script src="js/blocks/custom_python.js?v=20260429b"></script>
  <script src="js/blocks/game.js?v=20260429a"></script>

  <script>
    (function () {
      // Blockly は常に縮尺 1.0 で描画し、画面上の収まりだけ CSS transform で合わせる
      var MIN_RENDER_SCALE = 1.0;
      /** Blockly だけで済ませる経路との切り替えで細くなるのを避け、視覚倍率ほぼ1は CSS を使わない */
      var VISUAL_NEAR_ONE_EPS = 0.01;
      /** 視覚倍率の下限（もっと大きく＝スクロール増）。?readable=0 で無効、?minVisual= で調整可。 */
      var DEFAULT_MIN_VISUAL_SCALE = 0.86;

      var params    = new URLSearchParams(location.search);
      var srcUrl    = params.get('src');
      var inlineXml = params.get('xml');
      var titleText = params.get('title');
      var minVisualFloor = NaN;
      if (params.get('readable') === '0') {
        minVisualFloor = 0;
      } else {
        minVisualFloor = parseFloat(params.get('minVisual') || '');
        if (!(minVisualFloor > 0 && minVisualFloor <= 1)) {
          minVisualFloor = DEFAULT_MIN_VISUAL_SCALE;
        }
      }

      var titleBar   = document.getElementById('title-bar');
      var blocklyDiv = document.getElementById('blockly-div');
      var errorMsg   = document.getElementById('error-msg');

      // タイトルバー
      var topOffset = 0;
      if (titleText) {
        titleBar.textContent = decodeURIComponent(titleText);
        titleBar.style.display = 'block';
        topOffset = 32;
      }
      blocklyDiv.style.top    = topOffset + 'px';
      blocklyDiv.style.height = 'calc(100vh - ' + topOffset + 'px)';

      // ライトテーマ
      var viewerTheme = Blockly.Theme.defineTheme('pycoViewer', {
        base: Blockly.Themes.Classic,
        componentStyles: {
          workspaceBackgroundColour: '#f8fafc',
          scrollbarColour:           '#cbd5e1',
          scrollbarOpacity:          0.6,
        }
      });

      // readOnly:false にすることで FieldTextInput が正しい高さで描画される
      // （readOnly:true だと zelos で潰れる Blockly の挙動を回避）
      var workspace = Blockly.inject('blockly-div', {
        readOnly:   false,
        renderer:   'zelos',
        theme:      viewerTheme,
        scrollbars: true,
        zoom: { controls: true, wheel: true, startScale: 1.0, maxScale: 3, minScale: 0.3 },
        move: { scrollbars: true, drag: true, wheel: false },
        trashcan: false,
        toolbox:  null,
      });

      // Blocklyが後注入するCSSより確実に上書きするため動的に再注入
      (function() {
        var s = document.createElement('style');
        s.textContent = '.blocklyHtmlInput,.blocklyHtmlInput input,.blocklyHtmlInput textarea{'
          + 'min-height:44px!important;min-width:min(420px,92vw)!important;padding:6px 10px!important;'
          + 'line-height:1.45!important;font-size:15px!important;box-sizing:border-box!important}';
        document.head.appendChild(s);
      })();

      if (!srcUrl && !inlineXml) {
        errorMsg.style.display = 'flex';
        return;
      }

      // ---------- XML取得 ----------
      function resolveXmlText() {
        if (inlineXml) {
          try   { return Promise.resolve(decodeURIComponent(inlineXml)); }
          catch (e) { return Promise.reject(e); }
        }
        return fetch(srcUrl).then(function(r) {
          if (!r.ok) throw new Error('HTTP ' + r.status);
          return r.text();
        });
      }

      // ---------- レイアウト適用 ----------
      var currentXmlText = null;
      var renderedOk     = false;  // 有効なサイズで一度描画が完了したか
      var prevWasZero    = true;   // 前回のrect が 0×0 だったか
      var zeroRectRetries = 0;
      /** blockly-div がまだ 0×0 のとき rAF で再試行する回数上限（親・iframe のレイアウト確定が遅い対策） */
      var ZERO_RECT_RETRY_MAX = 48;
      /** 直近でレイアウト済みだった領域から幅・高さがこれ以上変われば XML を取り直す（謎の細さ／はみ出しの対策） */
      var LAYOUT_JUMP_RATIO = 0.11;
      var lastLayoutW = 0;
      var lastLayoutH = 0;

      function applyLayout() {
        if (!currentXmlText) return;

        var rect = blocklyDiv.getBoundingClientRect();
        var hasSize = (rect.width > 0 && rect.height > 0);

        if (!hasSize) {
          prevWasZero = true;
          if (zeroRectRetries++ < ZERO_RECT_RETRY_MAX) {
            requestAnimationFrame(applyLayout);
          }
          return;
        }

        zeroRectRetries = 0;

        // 一度描画したあとコンテナサイズが大きく変わったときはワークスペースごと張り替える
        if (renderedOk && lastLayoutW > 0 && lastLayoutH > 0) {
          var rw = rect.width / lastLayoutW;
          var rh = rect.height / lastLayoutH;
          if (
            rw < 1 - LAYOUT_JUMP_RATIO || rw > 1 + LAYOUT_JUMP_RATIO ||
            rh < 1 - LAYOUT_JUMP_RATIO || rh > 1 + LAYOUT_JUMP_RATIO
          ) {
            renderedOk = false;
            prevWasZero = true;
          }
        }

        // ① 0→有効サイズ への遷移、または初回描画 → XMLを再ロードして正しく描画
        if (prevWasZero || !renderedOk) {
          // display:none 内で inject した場合、内部 SVG が 0×0 のまま。
          // workspace.resize() でコンテナの現在サイズに同期してから描画する。
          // これを省くと FieldTextInput の SVG テキスト測定が誤って縦潰れが残る。
          workspace.resize();
          workspace.clear();
          Blockly.Xml.domToWorkspace(
            Blockly.utils.xml.textToDom(currentXmlText), workspace);
          renderedOk = true;
        }
        prevWasZero = false;

        // ② ブロックを画面に収める
        workspace.zoomToFit();
        var fittedScale = workspace.getScale();
        if (!(fittedScale > 0) || fittedScale !== fittedScale) {
          fittedScale = 1;
        }

        /** 画面上のサイズとなる倍率（zoomToFit の結果を CSS で再現） */
        var targetVisual = fittedScale;
        // ひどく細い縮小だけ抑える（readable=0 では丸ごと適用しない）
        if (minVisualFloor > 0 && targetVisual < 1) {
          targetVisual = Math.max(targetVisual, minVisualFloor);
        }

        /** inject 時 zoom.maxScale と揃える */
        var VISUAL_SCALE_MAX = 2.95;
        if (targetVisual > VISUAL_SCALE_MAX) {
          targetVisual = VISUAL_SCALE_MAX;
        }

        workspace.setScale(MIN_RENDER_SCALE);
        var useCss = Math.abs(targetVisual - 1) > VISUAL_NEAR_ONE_EPS;
        if (useCss) {
          blocklyDiv.style.setProperty('--viewer-css-scale', targetVisual.toFixed(4));
          blocklyDiv.classList.add('viewer-compact');
        } else {
          blocklyDiv.style.removeProperty('--viewer-css-scale');
          blocklyDiv.classList.remove('viewer-compact');
        }
        workspace.scrollCenter();

        lastLayoutW = rect.width;
        lastLayoutH = rect.height;

        // ④ 親フレームへブロック表示高さを通知（親にリスナーがあれば自動リサイズ可能）
        requestAnimationFrame(function() {
          try {
            var svgEl = blocklyDiv.querySelector('.blocklySvg');
            if (!svgEl) return;
            var svgRect = svgEl.getBoundingClientRect();
            if (svgRect.height < 10) return;
            var totalH = Math.ceil(svgRect.height) + (titleBar.offsetHeight || 0) + 16;
            window.parent.postMessage({ type: 'pyco-viewer-resize', height: totalH }, '*');
          } catch(e) {}
        });
      }

      // ---------- リサイズ対応（details開閉 / ウィンドウ変化） ----------
      var resizeTimer;
      function scheduleLayout() {
        clearTimeout(resizeTimer);
        resizeTimer = setTimeout(applyLayout, 200);
      }
      window.addEventListener('resize', scheduleLayout);

      // details の開閉でiframe内のwindow.resizeが発火しない場合があるため
      // ResizeObserver でblocklyDivのサイズ変化を直接監視する
      if (typeof ResizeObserver !== 'undefined') {
        new ResizeObserver(scheduleLayout).observe(blocklyDiv);
      }

      document.addEventListener('visibilitychange', function() {
        if (!document.hidden) scheduleLayout();
      });
      window.addEventListener('pageshow', function(ev) {
        if (ev.persisted) scheduleLayout();
      });

      // ---------- XML ロード & 初回描画 ----------
      resolveXmlText()
        .then(function(xmlText) {
          currentXmlText = xmlText;
          zeroRectRetries = 0;
          // 親レイアウト確定より先に動くことがあるため二重 rAF と遅延で再適用する
          requestAnimationFrame(function() {
            applyLayout();
            requestAnimationFrame(applyLayout);
          });
          if (document.fonts && document.fonts.ready) {
            document.fonts.ready.then(function() { scheduleLayout(); });
          }
          setTimeout(scheduleLayout, 350);
          setTimeout(scheduleLayout, 900);
        })
        .catch(function() {
          blocklyDiv.style.display = 'none';
          errorMsg.style.display   = 'flex';
        });

    })();
  </script>
</body>
</html>
