<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PycoBlocks ブロックビューアー</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #f8fafc; }

    #title-bar {
      display: none;
      background: #1e293b;
      color: #e2e8f0;
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 13px;
      padding: 0 14px;
      height: 32px;
      line-height: 32px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #blockly-div {
      position: absolute;
      left: 0;
      right: 0;
    }

    /* ブロック層の操作を無効化（ズームコントロールは別レイヤーなので影響なし） */
    .blocklyBlockCanvas,
    .blocklyBubbleCanvas {
      pointer-events: none !important;
    }

    #error-msg {
      display: none;
      position: absolute;
      inset: 0;
      align-items: center;
      justify-content: center;
      font-family: sans-serif;
      font-size: 14px;
      color: #94a3b8;
    }

    /* FieldTextInput / FieldNumber が zelos レンダラで縦に潰れて見えるのを防ぐ */
    .blocklyHtmlInput,
    .blocklyHtmlInput input,
    .blocklyHtmlInput textarea {
      min-height: 36px !important;
      padding: 4px 8px !important;
      line-height: 1.4 !important;
      box-sizing: border-box !important;
      font-size: 14px !important;
    }
  </style>
  <script src="https://unpkg.com/blockly@12.5.1/blockly.min.js"
          integrity="sha384-SxxR8fpocVLJMl6kYyBm33uuy9U1yy0gMrMavfyCd3lQRer3qaBMlcVb0VSAfzop"
          crossorigin="anonymous"></script>
</head>
<body>
  <div id="title-bar"></div>
  <div id="blockly-div"></div>
  <div id="error-msg">ブロックを読み込めませんでした</div>

  <!-- ブロック定義（app.js・game_engine.js・Skulpt は不要） -->
  <script src="js/block_palette.js?v=20260429a"></script>
  <script src="js/blocks/gpio.js"></script>
  <script src="js/blocks/control.js"></script>
  <script src="js/blocks/polyviabot.js?v=20260427c"></script>
  <script src="js/blocks/sensors.js?v=20260427c"></script>
  <script src="js/blocks/values.js?v=20260427b"></script>
  <script src="js/blocks/variables.js"></script>
  <script src="js/blocks/display.js"></script>
  <script src="js/generators/micropython.js"></script>
  <script src="js/blocks/python_intro.js"></script>
  <script src="js/blocks/custom_python.js?v=20260429b"></script>
  <script src="js/blocks/game.js?v=20260429a"></script>

  <script>
    (function () {
      var params     = new URLSearchParams(location.search);
      var srcUrl     = params.get('src');
      // GitHub Pages に未配置の XML 用：UTF-8 を application/x-www-form-urlencoded 風に encodeURIComponent した文字列
      var inlineXml  = params.get('xml');
      var titleText  = params.get('title');

      var titleBar  = document.getElementById('title-bar');
      var blocklyDiv = document.getElementById('blockly-div');
      var errorMsg  = document.getElementById('error-msg');

      // タイトルバー表示
      var topOffset = 0;
      if (titleText) {
        titleBar.textContent = titleText;
        titleBar.style.display = 'block';
        topOffset = 32;
      }
      blocklyDiv.style.top    = topOffset + 'px';
      blocklyDiv.style.height = 'calc(100vh - ' + topOffset + 'px)';

      // ライトテーマ
      var viewerTheme = Blockly.Theme.defineTheme('pycoViewer', {
        base: Blockly.Themes.Classic,
        componentStyles: {
          workspaceBackgroundColour: '#f8fafc',
          scrollbarColour:           '#cbd5e1',
          scrollbarOpacity:          0.6,
        }
      });

      // readOnly を外すことで FieldTextInput が正しい高さで描画される
      // （readOnly:true だと入力欄が薄く潰れて表示される Blockly の挙動を回避）
      // iframe 内の編集はリロードで元に戻るため問題なし
      var workspace = Blockly.inject('blockly-div', {
        readOnly:   false,
        // メインアプリと同じ zelos レンダラを使用してブロック形状を統一する
        renderer:   'zelos',
        theme:      viewerTheme,
        scrollbars: true,
        zoom: { controls: true, wheel: true, startScale: 0.9, maxScale: 3, minScale: 0.2 },
        move: { scrollbars: true, drag: true, wheel: false },
        trashcan: false,
        toolbox:  null,
      });

      // Blockly が <head> に CSS を後から注入するため、
      // FieldTextInput の高さオーバーライドをここで再注入して確実に適用する
      (function() {
        var s = document.createElement('style');
        s.textContent = [
          '.blocklyHtmlInput,',
          '.blocklyHtmlInput input,',
          '.blocklyHtmlInput textarea {',
          '  min-height: 36px !important;',
          '  padding: 4px 8px !important;',
          '  line-height: 1.4 !important;',
          '  font-size: 14px !important;',
          '  box-sizing: border-box !important;',
          '}'
        ].join('\n');
        document.head.appendChild(s);
      })();

      if (!srcUrl && !inlineXml) {
        errorMsg.style.display = 'flex';
        return;
      }

      function resolveXmlText() {
        if (inlineXml) {
          try {
            return Promise.resolve(decodeURIComponent(inlineXml));
          } catch (e) {
            return Promise.reject(e);
          }
        }
        return fetch(srcUrl)
          .then(function (r) {
            if (!r.ok) throw new Error('HTTP ' + r.status);
            return r.text();
          });
      }

      // ?xml=（埋め込み）または ?src=（URLフェッチ）で XML を取得してワークスペースに展開
      resolveXmlText()
        .then(function (xmlText) {
          var dom = Blockly.utils.xml.textToDom(xmlText);

          // ロード時点で高さが 0 なら details 閉じ中とみなし、
          // サイズ確定後に XML を再ロードしてフィールドを正しく描画する
          var initRect = blocklyDiv.getBoundingClientRect();
          var needsReload = (initRect.width === 0 || initRect.height === 0);

          Blockly.Xml.domToWorkspace(dom, workspace);

          // details 閉じ中は blockly-div が 0×0 になり zoomToFit が失敗するため、
          // 実サイズが確定するまで rAF でポーリングしてからフィットする
          var fitted = false;
          var deadline = Date.now() + 30000; // 最大30秒待つ
          function tryFit() {
            if (fitted) return;
            if (Date.now() > deadline) return;
            var rect = blocklyDiv.getBoundingClientRect();
            if (rect.width > 0 && rect.height > 0) {
              fitted = true;
              if (needsReload) {
                // height=0 で初期化されたブロックを正しいサイズで再描画する
                // domToWorkspace は DOM を破壊的に処理するため xmlText から再パースする
                workspace.clear();
                Blockly.Xml.domToWorkspace(
                  Blockly.utils.xml.textToDom(xmlText), workspace);
              }
              workspace.zoomToFit();
              // zoomToFit が縮小しすぎるとテキストフィールドが縦に細く見える。
              // スケールが 0.85 未満なら 0.85 に固定してスクロールで対応する。
              if (workspace.getScale() < 0.85) {
                workspace.setScale(0.85);
                workspace.scrollCenter();
              }
              // ブロック描画後の実際の高さを親フレームに通知して iframe を自動リサイズする
              requestAnimationFrame(function() {
                try {
                  var metrics = workspace.getMetricsManager().getContentMetrics(true);
                  var scale   = workspace.getScale();
                  var titleH  = titleBar.offsetHeight || 0;
                  var blockH  = Math.ceil(metrics.height * scale);
                  var totalH  = blockH + titleH + 48; // 余白 48px
                  window.parent.postMessage(
                    { type: 'pyco-viewer-resize', height: totalH },
                    '*'
                  );
                } catch(e) {}
              });
            } else {
              requestAnimationFrame(tryFit);
            }
          }
          requestAnimationFrame(tryFit);
        })
        .catch(function () {
          blocklyDiv.style.display = 'none';
          errorMsg.style.display   = 'flex';
        });
    })();
  </script>
</body>
</html>
